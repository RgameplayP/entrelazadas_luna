services:
  postgres:
    image: postgres:15
    container_name: tienda_db
    environment:
      POSTGRES_DB: tienda_artesanal
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tienda_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: tienda_backend
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: tienda_artesanal
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tienda_net

volumes:
  postgres_data:

networks:
  tienda_net: